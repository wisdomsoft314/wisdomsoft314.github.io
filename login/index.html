<!DOCTYPE html>
<html>
<head> 
<title>登录-WisdomSoft</title> 
</head>
<style>
input[type=text], select {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}

input[type=password], select {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}

input[type=submit] {
  width: 100%;
  background-color: #4CAF50;
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

input[type=submit]:hover {
  background-color: #45a049;
}

div {
  border-radius: 5px;
  background-color: #f2f2f2;
  padding: 20px;
}
</style>
<body>

<h1>登录</h1>

<div>
  <form>
    <label for="usnm">用户名</label>
    <input type="text" id="fname" name="firstname" placeholder="你的用户名……">
    <label for="lname">密码</label>
    <input type="password" id="lname" name="lastname" placeholder="你的密码……">
    <input type="submit" value="Submit">
  </form>
</div>

</body>
</html>
